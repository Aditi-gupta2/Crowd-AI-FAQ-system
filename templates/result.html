<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Crowd FAQ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-pattern"></div>

<div class="main-card">
    <div class="card">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">F</div>
            <span class="logo-text">CrowdFAQ</span>
        </div>

        <!-- Question -->
        <h1 class="heading" style="font-size: 28px;">
            Your Question
        </h1>
        <p class="subheading" style="margin-bottom: 20px; padding: 16px; background: var(--bg); border-radius: 12px;">
            {{ question }}
        </p>

        <!-- Answer -->
        <h1 class="heading" style="font-size: 28px;">
            Answer
        </h1>
        <p class="subheading" style="margin-bottom: 20px; padding: 16px; background: var(--primary-light); border-radius: 12px; color: var(--primary-dark); font-weight: 500;">
            {{ answer }}
        </p>

        <!-- Back Link -->
        <a href="/" class="admin-link">
            ← Ask Another Question
        </a>
    </div>
</div>

</body>
</html>
