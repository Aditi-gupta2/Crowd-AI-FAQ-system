<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdFAQ</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <nav>
        <div class="logo">
            CrowdFAQ
        </div>

        <a href="/admin" class="admin-link">
            Admin Panel
        </a>
    </nav>

    <main>

        <div class="hero-card">

            <h1>Find Answers Instantly</h1>

            <p>
                Search your knowledge base and discover relevant answers in seconds.
            </p>

            <form action="/ask" method="POST">

                <input
                    type="text"
                    id="questionInput"
                    name="question"
                    placeholder="Ask your question..."
                    required>

                <button type="submit">
                    Search
                </button>

            </form>

            <div class="chips">

                <span onclick="fillQuestion('How to reset password?')">
                    Reset Password
                </span>

                <span onclick="fillQuestion('How to register account?')">
                    Register Account
                </span>

                <span onclick="fillQuestion('How to contact support?')">
                    Contact Support
                </span>

            </div>

        </div>

    </main>

<script>

function fillQuestion(text){
    document.getElementById("questionInput").value = text;
}

const placeholders = [
    "How to reset password?",
    "How to register account?",
    "How to contact support?"
];

let i = 0;

setInterval(() => {
    document.getElementById("questionInput").placeholder =
    placeholders[i];

    i = (i + 1) % placeholders.length;
}, 2500);

</script>

</body>
</html>
